spring:
  application:
    name: video-platform
  datasource:
    url: jdbc:postgresql://localhost:5432/videodb
    username: iol
    password: iol
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

server:
  port: 8080

minio:
  endpoint: http://127.0.0.1:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: videos
  region: us-east-1

app:
  max-upload-bytes: 1073741824
  presign-ttl-seconds: 900
  playback-base-url: http://localhost:5173/storage
  transcode:
    max-retries: 3
    poll-ms: 4000
    lease-ttl-seconds: 120
    lease-renew-seconds: 45
    claim-lock-at-most-seconds: 45
  ffmpeg:
    command: ffmpeg
  hls-variants:
    - name: "480p"
      height: 480
      bandwidth-bps: 1000000
    - name: "720p"
      height: 720
      bandwidth-bps: 3000000
