spring:
  application:
    name: video-platform
  datasource:
    url: jdbc:postgresql://localhost:5432/videodb
    username: iol
    password: iol
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

server:
  port: 8080

minio:
  endpoint: http://127.0.0.1:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: videos
  region: us-east-1

app:
  max-upload-bytes: 1073741824
  presign-ttl-seconds: 900
  playback-base-url: http://localhost:5173/storage
  transcode:
    max-retries: 3
    poll-ms: 4000
  ffmpeg:
    command: ffmpeg
