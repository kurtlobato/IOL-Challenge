spring:
  application:
    name: video-platform
  datasource:
    url: jdbc:postgresql://localhost:5432/videodb
    username: iol
    password: iol
    hikari:
      maximum-pool-size: 12
      minimum-idle: 3
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1680000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  info:
    env:
      enabled: true
  health:
    minio:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

info:
  application:
    name: ${spring.application.name}

logging:
  level:
    root: INFO
    com.iol.video: INFO
    org.hibernate.SQL: WARN
    org.springframework.web: WARN
    io.minio: WARN

minio:
  endpoint: http://127.0.0.1:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: videos
  region: us-east-1
  http:
    connect-timeout-millis: 10000
    read-timeout-millis: 600000
    write-timeout-millis: 600000

app:
  max-upload-bytes: 1073741824
  presign-ttl-seconds: 900
  playback-base-url: http://localhost:5173/storage
  transcode:
    max-retries: 3
    poll-ms: 4000
    lease-ttl-seconds: 120
    lease-renew-seconds: 45
    claim-lock-at-most-seconds: 45
    ffmpeg-timeout-seconds: 7200
    ffmpeg-thumbnail-timeout-seconds: 180
  ffmpeg:
    command: ffmpeg
  hls-variants:
    - name: "480p"
      height: 480
      bandwidth-bps: 1000000
    - name: "720p"
      height: 720
      bandwidth-bps: 3000000
  stale-created-cleanup:
    max-age-hours: 24
    poll-ms: 3600000

resilience4j:
  circuitbreaker:
    instances:
      minio:
        register-health-indicator: true
        sliding-window-type: count_based
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
  timelimiter:
    instances:
      minio:
        timeout-duration: 15m
        cancel-running-future: true
