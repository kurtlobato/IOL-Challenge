services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: iol
      POSTGRES_PASSWORD: iol
      POSTGRES_DB: videodb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iol -d videodb"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/videodb
      SPRING_DATASOURCE_USERNAME: iol
      SPRING_DATASOURCE_PASSWORD: iol
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: videos
      MINIO_REGION: us-east-1
      APP_PLAYBACK_BASE_URL: http://localhost:8088/storage
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8088:80"
    depends_on:
      - api

volumes:
  pgdata:
  miniodata:
