services:
  api:
    build:
      context: ./backend-go
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      LANFLIX_LISTEN: ":8080"
      LANFLIX_DATA_DIR: /data
      LANFLIX_PUBLIC_BASE_URL: http://localhost:8080
      LANFLIX_NODE_NAME: lanflix-docker
      # Comma-separated peer base URLs (optional), e.g. http://192.168.1.20:8080
      LANFLIX_PEERS: ""
    volumes:
      - lanflix-data:/data
      - ./sample-media:/media:ro

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8088:80"
    depends_on:
      - api

volumes:
  lanflix-data:
